version: "3.9"

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://veritruth:veritruth_secret@postgres:5432/veritruth
  MONGODB_URL: mongodb://mongo:27017
  MONGODB_DB_NAME: veritruth
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: veritruth_neo4j
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: change-me-to-a-long-random-string
  JWT_ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
  GOOGLE_FACT_CHECK_API_KEY: ""
  OPENAI_API_KEY: ""
  ENVIRONMENT: production

services:
  # ---------- Databases ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: veritruth
      POSTGRES_PASSWORD: veritruth_secret
      POSTGRES_DB: veritruth
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritruth"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/veritruth_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p veritruth_neo4j 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Backend ----------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q default,analysis,maintenance
    environment:
      <<: *common-env
    depends_on:
      - api
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      <<: *common-env
    depends_on:
      - api
    restart: unless-stopped

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost/api/ws
    depends_on:
      - api
    restart: unless-stopped

  # ---------- Nginx ----------
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  neo4j_data:
  redis_data:
